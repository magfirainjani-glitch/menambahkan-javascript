<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a href="pendaftaran.html">Pendaftaran</a>
        <a href="poli.html">Pemeriksaan Poli</a>
        <a href="farmasi.html">Farmasi</a>
        <a href="Radiologi.html">Radiologi</a>
        <a href="laboratorium.html">Laboratorium</a>
        <a class="active" href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <!-- Form Pembayaran -->
        <div class="card">
            <h2>Pembayaran</h2>

            <input
                type="text"
                id="namaPasien"
                placeholder="Nama Pasien">

            <input
                type="number"
                id="totalBayar"
                placeholder="Total Pembayaran">

            <button onclick="bayar()">
                Bayar
            </button>
        </div>

        <!-- Riwayat Transaksi -->
        <div class="card">
            <h2>Riwayat Transaksi</h2>

            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Pasien</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>

                <tbody id="ttransaksi">

                </tbody>
            </table>
        </div>

    </div>

    <script>

        let transaksi = [];

        let editIndex = -1;

        function bayar() {

            let nama = document.getElementById("namaPasien").value;
            let total = document.getElementById("totalBayar").value;

            if (nama.trim() === "" || total === "") {
                alert("Nama Pasien dan Total Pembayaran wajib diisi!");
                return;
            }

            if (editIndex === -1) {

                transaksi.push({
                    nama: nama,
                    total: total,
                    status: "Lunas"
                });

                alert("Pembayaran Berhasil");

            } else {

                transaksi[editIndex].nama = nama;
                transaksi[editIndex].total = total;

                alert("Data Pembayaran Berhasil Diupdate");

                editIndex = -1;
            }

            renderTable();

            document.getElementById("namaPasien").value = "";
            document.getElementById("totalBayar").value = "";
        }

        function updateTransaksi(index) {

            document.getElementById("namaPasien").value =
                transaksi[index].nama;

            document.getElementById("totalBayar").value =
                transaksi[index].total;

            editIndex = index;
        }

        function hapusTransaksi(index) {

            if (confirm("Yakin ingin menghapus data transaksi?")) {

                transaksi.splice(index, 1);

                renderTable();

                alert("Data Transaksi Berhasil Dihapus");
            }
        }

        function renderTable() {

            let html = "";

            transaksi.forEach((item, index) => {

                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.nama}</td>
                        <td>Rp ${parseInt(item.total).toLocaleString('id-ID')}</td>
                        <td>
                            <span class="badge done">
                                ${item.status}
                            </span>
                        </td>
                        <td>
                            <button onclick="updateTransaksi(${index})">
                                Update
                            </button>

                            <button onclick="hapusTransaksi(${index})">
                                Hapus
                            </button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById("ttransaksi").innerHTML = html;
        }

    </script>

</body>

</html>
