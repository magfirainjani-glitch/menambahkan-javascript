<!DOCTYPE html>

    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css" />

<body>
    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>

    <div class="main">

        <div class="card">
            <h2>Radiologi</h2>

            <input type="text" placeholder="Nama Pasien">

            <select>
                <option value="">Pilih Pemeriksaan</option>
                <option value="xray">X-Ray</option>
                <option value="mri">MRI</option>
                <option value="ctscan">CT Scan</option>
                <option value="usg">USG</option>
            </select>

            <input placeholder="Hasil Radiologi"></input>

            <br><br>

            <button>Simpan Hasil</button>
        </div>

        <div class="card">
            <h2>Data Pemeriksaan Radiologi</h2>

            <table>
                <tr>
                    <th>Pasien</th>
                    <th>Pemeriksaan</th>
                    <th>Hasil</th>
                </tr>

                <tr>
                    <td>Andi</td>
                    <td>X-Ray</td>
                    <td>Tidak ditemukan kelainan</td>
                </tr>
            </table>
        </div>
