<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMKES</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <div class="sidebar">
        <h2>SIMKES</h2>
        <a href="index.html">Dashboard</a>
        <a href="pendaftaran.html">Pendaftaran</a>
        <a href="poli.html">Pemeriksaan Poli</a>
        <a href="farmasi.html">Farmasi</a>
        <a class="active" href="Radiologi.html">Radiologi</a>
        <a href="Laboratorium.html">Laboratorium</a>
        <a href="kasir.html">Kasir</a>
        <a href="login.html">Logout</a>
    </div>

    <div class="main">

        <!-- Form Radiologi -->
        <div class="card">
            <h2>Radiologi</h2>

            <input
                type="text"
                id="namaPasien"
                placeholder="Nama Pasien">

            <input
                type="text"
                id="pemeriksaan"
                placeholder="Jenis Pemeriksaan (X-Ray, CT Scan, MRI)">

            <input
                type="text"
                id="hasilRadiologi"
                placeholder="Hasil Radiologi">

            <button onclick="simpanHasil()">
                Simpan Hasil
            </button>
        </div>

        <!-- Tabel Radiologi -->
        <div class="card">
            <h2>Data Radiologi</h2>

            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Pasien</th>
                        <th>Pemeriksaan</th>
                        <th>Hasil</th>
                        <th>Aksi</th>
                    </tr>
                </thead>

                <tbody id="tradiologi">

                </tbody>
            </table>
        </div>

    </div>

    <script>

    let radiologi = localStorage.getItem('radiologi')
    ? JSON.parse(localStorage.getItem('radiologi'))
    : [];

        let editIndex = -1;

        function simpanHasil() {

            let nama = document.getElementById("namaPasien").value;
            let pemeriksaan = document.getElementById("pemeriksaan").value;
            let hasil = document.getElementById("hasilRadiologi").value;

            if (
                nama.trim() === "" ||
                pemeriksaan.trim() === "" ||
                hasil.trim() === ""
            ) {
                alert("Semua data harus diisi!");
                return;
            }

            if (editIndex === -1) {

                radiologi.push({
                    nama: nama,
                    pemeriksaan: pemeriksaan,
                    hasil: hasil
                });
            localStorage.setItem('radiologi', JSON.stringify(radiologi));
                alert("Hasil Radiologi Berhasil Disimpan");

            } else {

                radiologi[editIndex].nama = nama;
                radiologi[editIndex].pemeriksaan = pemeriksaan;
                radiologi[editIndex].hasil = hasil;
            localStorage.setItem('radiologi', JSON.stringify(radiologi));

                alert("Hasil Radiologi Berhasil Diupdate");

                editIndex = -1;
            }

            renderTable();

            document.getElementById("namaPasien").value = "";
            document.getElementById("pemeriksaan").value = "";
            document.getElementById("hasilRadiologi").value = "";
        }

        function updateRadiologi(index) {

            document.getElementById("namaPasien").value =
                radiologi[index].nama;

            document.getElementById("pemeriksaan").value =
                radiologi[index].pemeriksaan;

            document.getElementById("hasilRadiologi").value =
                radiologi[index].hasil;

            editIndex = index;
        }

        function hapusRadiologi(index) {

            if (confirm("Yakin ingin menghapus data radiologi?")) {

                radiologi.splice(index, 1);
                renderTable();
            localStorage.setItem('radiologi', JSON.stringify(radiologi));
                alert("Data Radiologi Berhasil Dihapus");
            }
        }

        function renderTable() {

            let html = "";

            radiologi.forEach((item, index) => {

                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.nama}</td>
                        <td>${item.pemeriksaan}</td>
                        <td>${item.hasil}</td>
                        <td>
                            <button onclick="updateRadiologi(${index})">
                                Update
                            </button>

                            <button onclick="hapusRadiologi(${index})">
                                Hapus
                            </button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById("tradiologi").innerHTML = html;
        }
    renderTable()
    </script>

</body>

</html>
